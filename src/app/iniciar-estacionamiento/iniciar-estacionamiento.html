<button class="back-button" (click)="volver()">
  <i class="fa-solid fa-arrow-left"></i>
  Volver
</button>
<div class="page">

  <header class="header">
    <h1>Registrar llegada</h1>
    <p>Introduce los kilómetros recorridos</p>
  </header>

  <div class="card">

    <div class="info-row">
      <span>Fecha</span>
      <strong>{{ fechaActual | date:'dd/MM/yyyy' }}</strong>
    </div>

    <div class="info-row">
      <span>Hora de llegada</span>
      <strong>{{ fechaActual | date:'HH:mm' }}</strong>
    </div>

    <div class="input-group">
      <label>Kilómetros recorridos</label>

      <div class="km-input">
        <i class="fa-solid fa-road"></i>

        <input
          type="number"
          min="0"
          step="0.1"
          placeholder="Ej: 4.5"
          [(ngModel)]="kilometros">
      </div>
    </div>

    <button class="btn-primary">
      <i class="fa-solid fa-person-walking-arrow-right"></i>
      Registrar llegada
    </button>

  </div>

</div>

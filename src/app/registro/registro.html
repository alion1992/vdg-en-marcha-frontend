<div class="register-page">

  <header class="register-header">

    <img
      src="assets/img/logoTipo2.png"
      alt="logo"
      class="logo">

    <h1>Crear cuenta</h1>

    <p>VdG-En Marcha</p>

  </header>

  <div class="register-card">

    <div class="input-group">

      <label>DNI</label>

      <div class="input-container"> <i class="fa-solid fa-id-card"></i> <input type="text" placeholder="12345678A" [(ngModel)]="dni"> </div>

    </div>

    <div class="input-group">

      <label>Nombre</label>

      <div class="input-container"> <i class="fa-solid fa-user"></i> <input type="text" placeholder="Nombre" [(ngModel)]="nombre"> </div>

    </div>

    <div class="input-group">

      <label>Apellidos</label>

      <div class="input-container"> <i class="fa-solid fa-user"></i> <input type="text" placeholder="Apellidos" [(ngModel)]="apellidos"> </div>

    </div>

    <div class="input-group">

      <label>Email</label>

      <div class="input-container"> <i class="fa-solid fa-envelope"></i> <input type="email" placeholder="correo@ejemplo.com" [(ngModel)]="email"> </div>

    </div>

    <div class="input-group">

      <label>Curso</label>

      <div class="input-container">
        <i class="fa-solid fa-graduation-cap"></i>

        <select [(ngModel)]="curso">
          <option>Selecciona un curso</option>
          <option>1º DAW</option>
          <option>2º DAW</option>
          <option>1º DAM</option>
          <option>2º DAM</option>
          <option>1º ASIR</option>
          <option>2º ASIR</option>
        </select>

      </div>

    </div>

    <div class="input-group">

      <label>Contraseña</label>

      <div class="input-container">
        <i class="fa-solid fa-lock"></i>
        <input
          type="password">
      </div>

    </div>

    <div class="input-group">

      <label>Confirmar contraseña</label>

      <div class="input-container"> <i class="fa-solid fa-lock"></i> <input type="password" [(ngModel)]="password"> </div>

    </div>

    <button class="register-button">
      Crear cuenta
    </button>

  </div>

</div>

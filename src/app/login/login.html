<div class="login-page">

  <!-- CABECERA -->
  <header class="login-header">
    <div class="logo-container">
      <img src="../assets/img/logoTipoI.png"
           alt="VdG-En Marcha"
           class="logo">
    </div>

    <div class="welcome-text">
      <h1>VdG-<span>En Marcha</span></h1>
      <p>Registro de movilidad sostenible</p>
    </div>
  </header>

  <!-- LOGIN -->
  <main class="login-content">

    <div class="login-card">

      <h2>Iniciar sesión</h2>
      <p class="subtitle">
        Accede para registrar tus entradas y salidas
      </p>

      <form>

        <!-- EMAIL -->
        <div class="input-group">
          <label for="document">DNI</label>

          <div class="input-container">
            <i class="fa-solid fa-id-card"></i>

            <input
              name="dni"
              id="document"
              placeholder="00000000X" [(ngModel)]="dni">
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
          <label for="document">Contraseña</label>

          <div class="input-container">
            <i class="fa-solid fa-lock"></i>

            <input
              name="password"
              type="password"
              id="password"
              placeholder="********" [(ngModel)]="password">
          </div>
        </div>

        <!-- RECORDAR -->
        <div class="options">
          <label class="remember">
            <input type="checkbox">
            Recordarme
          </label>

          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- BOTON -->
        <button
            type="button"
            class="login-button"
            (click)="login()">
            Entrar
            </button>
            <div class="register-link">
            ¿No tienes cuenta?
            <a routerLink="/registro">Regístrate</a>
            </div>

      </form>

    </div>

  </main>

</div>
